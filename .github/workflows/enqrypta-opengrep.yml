name: EnQrypta Opengrep Scan

on:
  workflow_call:
    inputs:
      api-url:
        required: true
        type: string
      notify-on-complete:
        required: false
        type: boolean
        default: false
      notification-email:
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      api-url:
        description: EnQrypta operational API base URL
        required: true
        type: string
      notify-on-complete:
        description: Send scan-complete email after successful ingest
        required: false
        type: boolean
        default: false
      notification-email:
        description: Recipient for scan-complete email
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dhyey-qvh/enqrypta-actions/.github/actions/enqrypta-opengrep@enqrypta-opengrep-workflow-v1
        with:
          api-url: ${{ inputs.api-url }}
          notify-on-complete: ${{ inputs.notify-on-complete }}
          notification-email: ${{ inputs.notification-email }}

      - name: Retain raw and normalized scan outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enqrypta-opengrep-${{ github.run_id }}-${{ github.run_attempt }}
          path: .enqrypta/
          if-no-files-found: warn
          retention-days: 30
